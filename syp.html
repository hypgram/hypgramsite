<!-- MAIN -->
<main class="form-page">

  <h2>Get your website</h2>

<form action="https://formspree.io/f/mojylpjb" method="POST">

  <label>Name</label>
  <input type="text" name="name" required>

  <label>Surname</label>
  <input type="text" name="surname" required>

  <label>Email</label>
  <input type="email" name="email" required>

  <label>Phone</label>
  <input type="tel" name="phone" required>

  <label>What kind of site do you need?</label>
  <select name="service" required>
    <option value="">Select</option>
    <option value="Showcase">Showcase</option>
    <option value="E-commerce">E-commerce</option>
    <option value="Blog">Blog</option>
    <option value="Portfolio">Portfolio</option>
    <option value="Business">Business</option>
    <option value="Event">Event</option>
    <option value="Personal">Personal</option>
    <option value="Membership">Membership</option>
    <option value="No-profit">Non-profit</option>
    <option value="Forum">Forum / Community</option>
    <option value="Membership Site">Membership / Subscription</option>
    <option value="Restaurants">Restaurants</option>
    <option value="E-learning">Educational / E-learning</option>
    <option value="News / Magazine">News / Online Magazine</option>
    <option value="Interactive">Interactive</option>
    <option value="Booking / Reservation">Booking / Reservation</option>
    <option value="Wedding">Wedding</option>
    <option value="Travel">Travel</option>
    <option value="Memorial">Memorial</option>
    <option value="Shop(doesn't ecommerce)">Shop (doesn't ecommerce)</option>
    <option value="Company">Company</option>
  </select>

  <label>Budget</label>
  <select name="budget" required>
    <option value="">Select</option>
    <option value="1000"> 1000 €</option>
    <option value="2000">2000 €</option>
    <option value="3000">3000 €</option>
    <option value="4000">4000 €</option>
    <option value="5000">5000 €</option>
    <option value="10000">10.000 €</option>
    <option value="20000">20.000 €</option>
    <option value="30000">30.000 €</option>
    <option value="40000">40.000 €</option>
    <option value="50000">50.000 €</option>
    <option value="50000+">50.000 € +</option>
  </select>

  <label>Notes / Request</label>
  <textarea name="message" rows="5"></textarea>

  <button type="submit">Submit</button>

</form>

</main>
